<div class="demo-shell">
  <header class="demo-header">
    <div class="demo-header__left">
      <img src="https://raw.githubusercontent.com/PianoNic/ngx-m3-calendar/master/assets/logo.svg" width="36" alt="logo" />
      <h1>ngx-m3-calendar</h1>
    </div>
    <div class="demo-header__right">
      <button mat-icon-button [matMenuTriggerFor]="themeMenu" matTooltip="Change theme">
        <mat-icon>palette</mat-icon>
      </button>
      <mat-menu #themeMenu="matMenu">
        @for (theme of themes; track theme.name) {
          <button mat-menu-item (click)="setTheme(theme)">
            <span class="theme-dot" [style.background]="theme.primary"></span>
            {{ theme.name }}
          </button>
        }
      </mat-menu>
      <button mat-icon-button (click)="toggleDark()" [matTooltip]="isDark() ? 'Light mode' : 'Dark mode'">
        <mat-icon>{{ isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>
      <a mat-icon-button href="https://buymeacoffee.com/PianoNic" target="_blank" matTooltip="Buy me a coffee">
        <mat-icon>coffee</mat-icon>
      </a>
      <a mat-stroked-button href="https://github.com/PianoNic/ngx-m3-calendar" target="_blank">
        GitHub
      </a>
      <a mat-flat-button href="https://www.npmjs.com/package/ngx-m3-calendar" target="_blank">
        npm
      </a>
    </div>
  </header>

  <main class="demo-main">
    <mc-calendar
      [events]="events"
      [viewMode]="'week'"
      [showViewToggle]="true"
      [darkMode]="isDark()"
      (eventClicked)="onEventClicked($event)"
      (viewModeChanged)="onViewChanged($event)"
      (dateSelected)="onDateSelected($event)"
    />
  </main>
</div>
